{%- assign google_analytics = site.google_analytics -%}
{%- assign ga_prefix_2 = google_analytics | slice: 0, 2 -%}
{%- assign ga_prefix_3 = google_analytics | slice: 0, 3 -%}
<script>
if (!(window.doNotTrack === "1" || navigator.doNotTrack === "1" || navigator.doNotTrack === "yes" || navigator.msDoNotTrack === "1")) {
  {% if ga_prefix_2 == 'G-' or ga_prefix_3 == 'GT-' %}
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  var script = document.createElement('script');
  script.async = true;
  script.src = 'https://www.googletagmanager.com/gtag/js?id={{ google_analytics }}';
  document.head.appendChild(script);

  gtag('js', new Date());
  gtag('config', '{{ google_analytics }}');
  {% else %}
  (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
  (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
  m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
  })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');

  ga('create', '{{ google_analytics }}', 'auto');
  ga('send', 'pageview');
  {% endif %}
}
</script>
